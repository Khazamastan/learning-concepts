<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>nth-of-type demo</title>
    <style>
      p:nth-of-type(2n + 3) {
        background: #ffeeaa;
      }
    </style>
  </head>
  <body>
    <div>
      <p>Para 1</p>
      <p>Para 2</p>
      <p>Para 3</p>
      <p>Para 4</p>
      <p>Para 5</p>
      <p>Para 6</p>
      <p>Para 7</p>
      <p>Para 8</p>
    </div>
  </body>
</html>
