<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Overlapping Image Gallery</title>
    <meta name="description" content="Beginner friendly overlapping image gallery using modern CSS." />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="gallery-shell">
      <header>
        <p class="eyebrow">Lookbook</p>
        <h1>Textures in Motion</h1>
        <p>Layered imagery creates depth and draws attention to featured moments from the latest editorial shoot.</p>
      </header>
      <section class="gallery" aria-label="Overlapping gallery">
        <figure class="card card--left">
          <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=800&q=80" alt="Model posing with flowing beige fabric" />
          <figcaption>Desert hues</figcaption>
        </figure>
        <figure class="card card--center">
          <img src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1?auto=format&fit=crop&w=800&q=80" alt="Close portrait with light play" />
          <figcaption>Soft focus</figcaption>
        </figure>
        <figure class="card card--right">
          <img src="https://images.unsplash.com/photo-1530023367847-a683933f4171?auto=format&fit=crop&w=800&q=80" alt="Model leaning on railing in city" />
          <figcaption>City energy</figcaption>
        </figure>
      </section>
    </main>
  </body>
</html>
