syntax = "proto3";

package catalog;

service CatalogService {
  rpc GetProduct(ProductRequest) returns (ProductResponse);
  rpc ListProducts(Empty) returns (stream ProductResponse);
}

message Empty {}

message ProductRequest {
  string id = 1;
}

message ProductResponse {
  string id = 1;
  string name = 2;
  double price = 3;
  int32 stock = 4;
}
